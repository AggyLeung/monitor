name: CD

on:
  push:
    branches: ["develop", "main", "master"]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: go-core
            dockerfile: ./go-core/Dockerfile
            context: ./go-core
          - service: python-discovery
            dockerfile: ./python-discovery/Dockerfile
            context: ./python-discovery
          - service: python-workflow
            dockerfile: ./python-workflow/Dockerfile
            context: ./python-workflow
          - service: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=staging,enable=${{ github.ref_name == 'develop' }}
            type=raw,value=prod,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    if: github.ref_name == 'develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'staging')
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Render staging image tags
        run: |
          echo "Deploying staging with immutable SHA tags from this commit."
          echo "go-core=${{ env.REGISTRY }}/${{ github.repository_owner }}/go-core:sha-${{ github.sha }}"
          echo "python-discovery=${{ env.REGISTRY }}/${{ github.repository_owner }}/python-discovery:sha-${{ github.sha }}"
          echo "python-workflow=${{ env.REGISTRY }}/${{ github.repository_owner }}/python-workflow:sha-${{ github.sha }}"
          echo "frontend=${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:sha-${{ github.sha }}"

      - name: Deploy to staging
        env:
          STAGING_DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$STAGING_DEPLOY_WEBHOOK" ]; then
            echo "STAGING_DEPLOY_WEBHOOK is not configured. Skipping actual deploy call."
            exit 0
          fi
          curl -X POST "$STAGING_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "environment":"staging",
              "commit":"${{ github.sha }}",
              "images":{
                "go-core":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/go-core:sha-${{ github.sha }}"'",
                "python-discovery":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/python-discovery:sha-${{ github.sha }}"'",
                "python-workflow":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/python-workflow:sha-${{ github.sha }}"'",
                "frontend":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:sha-${{ github.sha }}"'"
              }
            }'

  deploy-production:
    if: github.ref_name == 'main' || github.ref_name == 'master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production')
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Render production image tags
        run: |
          echo "Deploying production with immutable SHA tags from this commit."
          echo "go-core=${{ env.REGISTRY }}/${{ github.repository_owner }}/go-core:sha-${{ github.sha }}"
          echo "python-discovery=${{ env.REGISTRY }}/${{ github.repository_owner }}/python-discovery:sha-${{ github.sha }}"
          echo "python-workflow=${{ env.REGISTRY }}/${{ github.repository_owner }}/python-workflow:sha-${{ github.sha }}"
          echo "frontend=${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:sha-${{ github.sha }}"

      - name: Deploy to production
        env:
          PROD_DEPLOY_WEBHOOK: ${{ secrets.PROD_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$PROD_DEPLOY_WEBHOOK" ]; then
            echo "PROD_DEPLOY_WEBHOOK is not configured. Skipping actual deploy call."
            exit 0
          fi
          curl -X POST "$PROD_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "environment":"production",
              "commit":"${{ github.sha }}",
              "images":{
                "go-core":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/go-core:sha-${{ github.sha }}"'",
                "python-discovery":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/python-discovery:sha-${{ github.sha }}"'",
                "python-workflow":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/python-workflow:sha-${{ github.sha }}"'",
                "frontend":"'"${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:sha-${{ github.sha }}"'"
              }
            }'
