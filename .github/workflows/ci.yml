name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download deps
        run: go mod download
      - name: Unit tests
        run: go test ./...

  python-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [python-discovery, python-workflow]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall .

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
