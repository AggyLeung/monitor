version: "3"
services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cmdb
      POSTGRES_USER: cmdb
      POSTGRES_PASSWORD: secret
    volumes:
      - dev_pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - dev_neo4jdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  dev_pgdata:
  dev_neo4jdata:
