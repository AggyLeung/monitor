services:
  go-core:
    build: ./go-core
    container_name: go-core
    ports:
      - "8080:8080"
    environment:
      - HTTP_ADDR=:8080
      - POSTGRES_DSN=host=postgres user=postgres password=postgres dbname=cmdb port=5432 sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_STREAM=cmdb_tasks
      - JWT_SECRET=replace-me
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - postgres
      - redis
      - neo4j

  python-discovery:
    build: ./python-discovery
    container_name: python-discovery
    ports:
      - "8010:8010"
    environment:
      - CMDB_BASE_URL=http://go-core:8080
      - CMDB_API_KEY=replace-me
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_STREAM=cmdb_tasks
    depends_on:
      - go-core
      - redis

  python-workflow:
    build: ./python-workflow
    container_name: python-workflow
    ports:
      - "8011:8011"
    depends_on:
      - go-core

  postgres:
    image: postgres:16
    container_name: cmdb-postgres
    environment:
      - POSTGRES_DB=cmdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./go-core/migrations:/docker-entrypoint-initdb.d

  neo4j:
    image: neo4j:5
    container_name: cmdb-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  redis:
    image: redis:7
    container_name: cmdb-redis
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    container_name: cmdb-frontend
    ports:
      - "5173:80"
    depends_on:
      - go-core

volumes:
  pgdata:
  neo4jdata:
